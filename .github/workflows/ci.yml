name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Install Node dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Full regression suite
        run: npm test
      - name: Release consistency
        run: npm run release:check
      - name: Reproducible install smoke
        run: |
          node scripts/install-skill.mjs --target "$RUNNER_TEMP/south-china-report" --apply
          node scripts/install-skill.mjs --target "$RUNNER_TEMP/south-china-report" --check
